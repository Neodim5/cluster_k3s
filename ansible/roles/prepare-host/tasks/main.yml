---
- name: Ensure system is up to date
  apt:
    upgrade: dist
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  
- name: Install containerd dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"
  
- name: Configure firewall (UFW)
  when: configure_firewall | default(false)
  block:
    - name: Install UFW
      apt:
        name: ufw
        state: present
        
    - name: Allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp
        
    - name: Allow K3S API server
      ufw:
        rule: allow
        port: '6443'
        proto: tcp
        comment: "K3S API Server"
        
    - name: Allow etcd ports (for HA)
      ufw:
        rule: allow
        port: '2379:2381'
        proto: tcp
        comment: "etcd"
      when: inventory_hostname in groups['masters']
      
    - name: Allow NodePort range
      ufw:
        rule: allow
        port: '30000:32767'
        proto: tcp
        comment: "Kubernetes NodePort"
        
    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
      when: enable_ufw | default(false)

- name: Configure system limits
  blockinfile:
    path: /etc/security/limits.conf
    block: |
      # Kubernetes requirements
      root soft nofile 1048576
      root hard nofile 1048576
      * soft nofile 1048576
      * hard nofile 1048576
      * soft nproc 65535
      * hard nproc 65535
    marker: "# {mark} ANSIBLE MANAGED BLOCK - K8S LIMITS"
    
- name: Configure PAM limits
  lineinfile:
    path: /etc/pam.d/common-session
    line: "session required pam_limits.so"
    create: yes
    
- name: Increase inotify limits
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: 'fs.inotify.max_user_watches', value: '524288' }
    - { name: 'fs.inotify.max_user_instances', value: '512' }
    - { name: 'vm.max_map_count', value: '262144' }
