---
- name: Install K3S
  hosts: all
  become: true
  
  vars:
    k3s_version: "{{ k3s_version | default('v1.28.5+k3s1') }}"
    k3s_token: "{{ k3s_token | default(lookup('password', '/dev/null length=32 chars=ascii_letters,digits')) }}"
    
  tasks:
    - name: Download K3S binary
      get_url:
        url: https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s
        dest: /usr/local/bin/k3s
        mode: '0755'
        
    - name: Create K3S config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'
        
    - name: Create K3S service environment file
      copy:
        dest: /etc/systemd/system/k3s.service.env
        content: |
          # K3S Environment Configuration
          K3S_VERSION={{ k3s_version }}
        mode: '0644'
