---
# Middle template: 3 masters for HA, workers added as needed
template_name: middle
description: "High availability cluster with 3 master nodes"

k3s_config:
  masters_count: 3
  workers_count: "{{ workers_count | default(2) }}"
  
  # K3S configuration
  cluster_cidr: "10.42.0.0/16"
  service_cidr: "10.43.0.0/16"
  
  # Database backend for HA
  datastore:
    type: embedded_etcd
    endpoint: ""
  
  # Master node configuration
  master_nodes:
    - name: k3s-master-1
      role: server
      extra_args: "--cluster-init"
    - name: k3s-master-2
      role: server
      extra_args: ""
    - name: k3s-master-3
      role: server
      extra_args: ""
  
  # Worker node configuration  
  worker_nodes:
    - name_prefix: k3s-worker
      count: "{{ workers_count | default(2) }}"
      extra_args: ""

addons:
  metrics_server: true
  local_path_storage: true
  ingress_controller: true
  
ingress:
  type: traefik
  replicas: 2

monitoring:
  enabled: true
  prometheus: true
  grafana: false

loadbalancer:
  enabled: true
  type: metallb
  ip_range: "192.168.1.200-192.168.1.250"
